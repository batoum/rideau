<script>
function updateDateTime() {
const now = new Date();

const date = now.toLocaleDateString('en-GB', {
day: '2-digit',
month: '2-digit',
year: 'numeric'
});

const time = now.toLocaleTimeString('en-GB', {
hour: '2-digit',
minute: '2-digit',
second: '2-digit'
});

document.getElementById('datetime').innerHTML =
time + '&nbsp; &#183; &nbsp;' + date;
}

updateDateTime();
setInterval(updateDateTime, 1000);
</script>
